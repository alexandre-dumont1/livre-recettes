<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Livre de Recettes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
:root {
  --white: #ffffff;
  --off-white: #faf9f7;
  --page-bg: #f7f5f1;
  --warm-black: #1a1714;
  --ink: #221e1a;
  --ink-mid: #6b6259;
  --ink-light: #a09690;
  --accent: #c8603a;
  --accent-warm: #e8845c;
  --ruled: rgba(180,170,160,0.18);
  --border: rgba(200,190,180,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: #111009;
  background-image: radial-gradient(ellipse 80% 60% at 50% 50%, #1e1a14 0%, #0d0b08 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: #0d0b08;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  z-index: 300;
}

.site-logo {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: rgba(255,255,255,0.85);
  letter-spacing: -0.01em;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 1.2rem;
}

.search-input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.8);
  padding: 0.3rem 0.8rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  letter-spacing: 0.02em;
  width: 180px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: rgba(255,255,255,0.25); }
.search-input:focus { border-color: rgba(200,96,58,0.5); }

.filters { display: flex; gap: 0.3rem; }

.cat-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0.25rem 0.5rem;
  transition: color 0.2s;
}
.cat-btn:hover { color: rgba(255,255,255,0.7); }
.cat-btn.active { color: var(--accent); }

.page-counter {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.2);
  min-width: 50px;
  text-align: right;
}

/* BOOK STAGE */
.stage {
  position: relative;
  z-index: 10;
  margin-top: 48px;
  perspective: 2400px;
}

.book-outer {
  position: relative;
  filter: drop-shadow(0 40px 80px rgba(0,0,0,0.7));
}

.book {
  position: relative;
  width: 1080px;
  height: 700px;
  display: flex;
}

/* SPINE */
.spine {
  position: absolute;
  left: calc(50% - 10px);
  top: 0;
  width: 20px;
  height: 100%;
  background: linear-gradient(to right, #0d0b08 0%, #2a2520 30%, #1a1714 50%, #2a2520 70%, #0d0b08 100%);
  z-index: 50;
  box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

/* PAGES WRAPPER */
.book-pages {
  display: flex;
  width: 100%;
  height: 100%;
  position: relative;
}

.page-flip-container {
  position: absolute;
  height: 100%;
  transform-style: preserve-3d;
  overflow: hidden;
}

.pfc-left {
  width: calc(50% - 10px);
  left: 0;
  transform-origin: right center;
}

.pfc-right {
  width: calc(50% - 10px);
  left: calc(50% + 10px);
  transform-origin: left center;
}

.pfc-left.flipping-fwd {
  animation: flipFwd 0.72s cubic-bezier(0.77, 0, 0.175, 1) forwards;
  z-index: 100;
}
.pfc-right.flipping-back {
  animation: flipBack 0.72s cubic-bezier(0.77, 0, 0.175, 1) forwards;
  z-index: 100;
}

@keyframes flipFwd {
  0%   { transform: rotateY(0deg); }
  50%  { transform: rotateY(-90deg); filter: brightness(0.7); }
  100% { transform: rotateY(-180deg); }
}
@keyframes flipBack {
  0%   { transform: rotateY(0deg); }
  50%  { transform: rotateY(90deg); filter: brightness(0.7); }
  100% { transform: rotateY(180deg); }
}

/* PAGE GAUCHE — RECETTE MANUSCRITE */
.page-left {
  width: 100%;
  height: 100%;
  background: var(--white);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: inset -12px 0 30px rgba(0,0,0,0.07);
}

/* Lignes réglées très subtiles */
.page-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 30px,
    var(--ruled) 30px,
    var(--ruled) 30.5px
  );
  pointer-events: none;
  z-index: 0;
}

.page-left-header {
  position: relative;
  z-index: 1;
  padding: 2.2rem 2.4rem 1.4rem;
  border-bottom: 2.5px solid var(--warm-black);
  flex-shrink: 0;
}

.recipe-category {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  display: block;
  margin-bottom: 0.5rem;
}

.recipe-title-modern {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 2.1rem;
  line-height: 1.1;
  color: var(--warm-black);
  letter-spacing: -0.02em;
  display: block;
  margin-bottom: 0.6rem;
}

.recipe-servings {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.75rem;
  color: var(--ink-light);
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 1rem;
}

.meta-pill { display: inline-flex; align-items: center; gap: 0.25rem; color: var(--ink-mid); }

.page-left-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.4rem 2.4rem 2.5rem;
  position: relative;
  z-index: 1;
  scrollbar-width: thin;
  scrollbar-color: rgba(200,96,58,0.2) transparent;
}
.page-left-body::-webkit-scrollbar { width: 3px; }
.page-left-body::-webkit-scrollbar-thumb { background: rgba(200,96,58,0.25); }

.section-tag {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-light);
  display: block;
  margin: 1.2rem 0 0.7rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border);
}

.ingr-group-title {
  font-family: 'Caveat', cursive;
  font-size: 1.0rem;
  color: var(--ink-mid);
  font-style: italic;
  display: block;
  margin: 0.8rem 0 0.3rem;
}

.ingr-list { list-style: none; }

.ingr-item {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 0.5rem;
  padding: 0.22rem 0;
  align-items: baseline;
  border-bottom: 1px solid rgba(200,190,180,0.12);
}

.ingr-qty {
  font-family: 'Caveat', cursive;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--accent);
  text-align: right;
  padding-right: 0.5rem;
}

.ingr-name {
  font-family: 'Caveat', cursive;
  font-size: 1.08rem;
  color: var(--ink);
  line-height: 1.4;
}

.ingr-prep {
  font-size: 0.85em;
  color: var(--ink-light);
  font-style: italic;
}

.steps-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

.step-item {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}

.step-number {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 2rem;
  line-height: 1;
  color: var(--accent);
  opacity: 0.25;
  flex-shrink: 0;
  width: 28px;
  text-align: right;
  margin-top: -0.1rem;
}

.step-body { flex: 1; }

.step-head {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-light);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.25rem;
}

.step-duration { color: var(--accent); opacity: 0.7; }

.step-temp {
  background: var(--accent);
  color: white;
  font-size: 0.58rem;
  padding: 0.1rem 0.35rem;
  letter-spacing: 0.06em;
  font-weight: 500;
}

.step-text {
  font-family: 'Caveat', cursive;
  font-size: 1.08rem;
  color: var(--ink);
  line-height: 1.6;
}

.notes-block {
  margin-top: 1.2rem;
  padding: 0.9rem 1rem;
  border-left: 3px solid var(--accent);
  background: rgba(200,96,58,0.04);
}

.notes-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  display: block;
  margin-bottom: 0.35rem;
}

.notes-text {
  font-family: 'Caveat', cursive;
  font-size: 1.0rem;
  color: var(--ink-mid);
  line-height: 1.55;
  font-style: italic;
}

.page-num-left {
  position: absolute;
  bottom: 1.2rem;
  left: 2.4rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  z-index: 1;
}

/* PAGE DROITE */
.page-right {
  width: 100%;
  height: 100%;
  background: var(--page-bg);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: inset 12px 0 30px rgba(0,0,0,0.04);
}

/* Avec PDF — toute la page */
.pdf-full {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.pdf-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.4rem 2rem 1rem;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}

.pdf-topbar-title {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--warm-black);
  opacity: 0.5;
}

.pdf-open-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  text-decoration: none;
  opacity: 0.8;
  transition: opacity 0.2s;
}
.pdf-open-link:hover { opacity: 1; }

.pdf-iframe {
  flex: 1;
  width: 100%;
  border: none;
}

/* Sans PDF — mise en page typographique Ottolenghi */
.no-pdf-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 2.4rem 2.2rem 2.4rem;
}

.no-pdf-cat {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.6rem;
  display: block;
}

.no-pdf-title {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 2.9rem;
  line-height: 1.05;
  color: var(--warm-black);
  letter-spacing: -0.02em;
  margin-bottom: 1.5rem;
}

.deco-line {
  width: 40px;
  height: 3px;
  background: var(--accent);
  margin-bottom: 1.8rem;
}

.tags-block {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 1rem;
}

.tag-pill {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--ink-mid);
  border: 1px solid var(--border);
  padding: 0.2rem 0.6rem;
}

.recipe-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.stat-item {
  background: var(--page-bg);
  padding: 0.9rem 1rem;
}

.stat-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.55rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-light);
  display: block;
  margin-bottom: 0.2rem;
}

.stat-value {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.4rem;
  color: var(--warm-black);
  line-height: 1;
}

.source-block {
  padding-top: 1.2rem;
  flex-shrink: 0;
}

.source-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  color: var(--ink-light);
  font-style: italic;
}

.page-num-right {
  position: absolute;
  bottom: 1.2rem;
  right: 2rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  z-index: 1;
}

/* NAV ARROWS */
.nav-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.25);
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.2s;
  z-index: 200;
  user-select: none;
}
.nav-arrow:hover:not(:disabled) { border-color: rgba(200,96,58,0.4); color: var(--accent); }
.nav-arrow:disabled { opacity: 0.1; cursor: default; }
.nav-prev { left: 1.2rem; }
.nav-next { right: 1.2rem; }

/* TABLE DES MATIÈRES */
.toc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(13,11,8,0.92);
  z-index: 400;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
}
.toc-overlay.open { display: flex; }

.toc-panel {
  background: var(--white);
  width: 640px;
  max-height: 78vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.toc-panel-header {
  padding: 2rem 2.4rem 1.4rem;
  border-bottom: 2.5px solid var(--warm-black);
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.toc-panel-title {
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.8rem;
  color: var(--warm-black);
  letter-spacing: -0.02em;
}

.toc-close {
  background: none;
  border: none;
  font-size: 0.7rem;
  color: var(--ink-light);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.3rem 0;
}

.toc-body {
  overflow-y: auto;
  padding: 1.4rem 2.4rem 2rem;
  scrollbar-width: thin;
  scrollbar-color: rgba(200,96,58,0.2) transparent;
}

.toc-section-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 1.2rem 0 0.5rem;
}

.toc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}

.toc-item {
  font-family: 'Caveat', cursive;
  font-size: 1.05rem;
  color: var(--ink-mid);
  cursor: pointer;
  padding: 0.3rem 0.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: color 0.15s;
  border-bottom: 1px solid rgba(200,190,180,0.15);
}
.toc-item:hover { color: var(--warm-black); }

.toc-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

.toc-btn {
  position: fixed;
  bottom: 1.8rem;
  left: 50%;
  transform: translateX(-50%);
  background: none;
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.22);
  padding: 0.4rem 1.2rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 200;
}
.toc-btn:hover { border-color: rgba(200,96,58,0.35); color: var(--accent); }

.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-family: 'DM Serif Display', serif;
  font-style: italic;
  font-size: 1.1rem;
  color: rgba(26,23,20,0.18);
  letter-spacing: 0.02em;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="site-logo">Le Livre de Recettes</div>
  <div class="topbar-right">
    <input type="search" class="search-input" id="search" placeholder="Rechercher…">
    <div class="filters">
      <button class="cat-btn active" data-cat="0">Toutes</button>
      <button class="cat-btn" data-cat="1">Entrées</button>
      <button class="cat-btn" data-cat="2">Plats</button>
      <button class="cat-btn" data-cat="3">Poissons</button>
      <button class="cat-btn" data-cat="4">Desserts</button>
    </div>
    <div class="page-counter" id="pageCounter">— / —</div>
  </div>
</div>

<div class="stage">
  <div class="book-outer">
    <div class="book">
      <div class="spine"></div>
      <div class="book-pages">
        <div class="page-flip-container pfc-left" id="pfcLeft">
          <div class="page-left" id="pageLeft">
            <div class="loading-state">Chargement…</div>
          </div>
        </div>
        <div class="page-flip-container pfc-right" id="pfcRight">
          <div class="page-right" id="pageRight">
            <div class="loading-state"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="nav-arrow nav-prev" id="prevBtn" onclick="changePage(-1)" disabled>‹</button>
<button class="nav-arrow nav-next" id="nextBtn" onclick="changePage(1)">›</button>
<button class="toc-btn" onclick="openTOC()">Table des matières</button>

<div class="toc-overlay" id="tocOverlay" onclick="closeTOCOutside(event)">
  <div class="toc-panel">
    <div class="toc-panel-header">
      <div class="toc-panel-title">Table des Matières</div>
      <button class="toc-close" onclick="closeTOC()">Fermer ✕</button>
    </div>
    <div class="toc-body" id="tocBody"></div>
  </div>
</div>

<script>
const URL_SB = 'https://TON-PROJECT-ID.supabase.co';
const KEY_SB = 'ta-publishable-key-supabase';

const CATS = { 1: 'Entrée', 2: 'Plat', 3: 'Poisson', 4: 'Dessert', 5: 'Gibier', 6: 'Accompagnement' };
const CAT_COLORS = { 1: '#c8603a', 2: '#3a6ab0', 3: '#1a8a6a', 4: '#b07a1a', 5: '#7a3ab0', 6: '#3a8a3a' };

let allRecipes = [], filteredRecipes = [], currentIndex = 0, isAnimating = false, catFilter = 0;

async function sb(path) {
  const r = await fetch(`${URL_SB}/rest/v1/${path}`, {
    headers: { apikey: KEY_SB, Authorization: `Bearer ${KEY_SB}` }
  });
  return r.json();
}

function ft(min) {
  if (!min) return null;
  if (min < 60) return min + ' min';
  const h = Math.floor(min/60), m = min % 60;
  return m ? `${h}h${String(m).padStart(2,'0')}` : `${h}h`;
}

async function renderLeft(recipe) {
  const [ingrs, steps] = await Promise.all([
    sb(`recipe_ingredients?select=*,ingredients(name)&recipe_id=eq.${recipe.id}&order=display_order`),
    sb(`recipe_steps?select=*&recipe_id=eq.${recipe.id}&order=step_number`)
  ]);

  const cat = CATS[recipe.category_id] || '';
  const groups = {};
  ingrs.forEach(i => {
    const g = i.group_label || '';
    if (!groups[g]) groups[g] = [];
    groups[g].push(i);
  });

  let ingrHTML = '';
  Object.entries(groups).forEach(([g, items]) => {
    if (g) ingrHTML += `<span class="ingr-group-title">${g}</span>`;
    ingrHTML += `<ul class="ingr-list">`;
    items.forEach(i => {
      const qty = [i.quantity, i.unit].filter(Boolean).join('\u202f');
      const prep = i.preparation ? `<span class="ingr-prep">, ${i.preparation}</span>` : '';
      ingrHTML += `<li class="ingr-item">
        <span class="ingr-qty">${qty}</span>
        <span class="ingr-name">${i.ingredients?.name || ''}${prep}</span>
      </li>`;
    });
    ingrHTML += `</ul>`;
  });

  let stepsHTML = '';
  steps.forEach(s => {
    const dur = s.duration_minutes ? `<span class="step-duration">${ft(s.duration_minutes)}</span>` : '';
    const temp = s.temperature_celsius ? `<span class="step-temp">${s.temperature_celsius}\u00b0C</span>` : '';
    stepsHTML += `<li class="step-item">
      <span class="step-number">${s.step_number}</span>
      <div class="step-body">
        <div class="step-head"><span>${s.title}</span>${dur}${temp}</div>
        <div class="step-text">${s.description}</div>
      </div>
    </li>`;
  });

  const notesHTML = recipe.notes ? `
    <div class="notes-block">
      <span class="notes-label">Note</span>
      <span class="notes-text">${recipe.notes}</span>
    </div>` : '';

  const servingsMeta = [
    recipe.servings ? `${recipe.servings} ${recipe.servings_unit || 'personnes'}` : null,
    recipe.difficulty || null
  ].filter(Boolean).map(v => `<span class="meta-pill">${v}</span>`).join('');

  return `
    <div class="page-left-header">
      <span class="recipe-category">${cat}</span>
      <span class="recipe-title-modern">${recipe.title}</span>
      <div class="recipe-servings">${servingsMeta}</div>
    </div>
    <div class="page-left-body">
      ${ingrs.length ? `<span class="section-tag">Ingr\u00e9dients</span>${ingrHTML}` : ''}
      ${steps.length ? `<span class="section-tag">Pr\u00e9paration</span><ol class="steps-list">${stepsHTML}</ol>` : ''}
      ${notesHTML}
    </div>
    <span class="page-num-left">${currentIndex + 1}</span>`;
}

function renderRight(recipe) {
  const cat = CATS[recipe.category_id] || '';
  const tags = (recipe.tags || []).slice(0, 6);

  const stats = [];
  if (recipe.prep_time_minutes) stats.push({ label: 'Pr\u00e9paration', val: ft(recipe.prep_time_minutes) });
  if (recipe.cook_time_minutes) stats.push({ label: 'Cuisson', val: ft(recipe.cook_time_minutes) });
  if (recipe.rest_time_minutes) stats.push({ label: 'Repos', val: ft(recipe.rest_time_minutes) });
  if (recipe.servings) stats.push({ label: 'Personnes', val: recipe.servings });
  while (stats.length > 0 && stats.length % 2 !== 0) stats.push(null);

  const statsHTML = stats.length ? `
    <div class="recipe-stats">
      ${stats.map(s => s ? `
        <div class="stat-item">
          <span class="stat-label">${s.label}</span>
          <span class="stat-value">${s.val}</span>
        </div>` : '<div class="stat-item"></div>'
      ).join('')}
    </div>` : '';

  const tagsHTML = tags.length ? `
    <div class="tags-block">
      ${tags.map(t => `<span class="tag-pill">${t}</span>`).join('')}
    </div>` : '';

  const sourceHTML = recipe.source ? `
    <div class="source-block">
      <span class="source-text">Source\u202f: ${recipe.author ? recipe.author + ', ' : ''}${recipe.source}</span>
    </div>` : '';

  if (recipe.pdf_url) {
    return `
      <div class="pdf-full">
        <div class="pdf-topbar">
          <span class="pdf-topbar-title">Recette originale</span>
          <a href="${recipe.pdf_url}" target="_blank" class="pdf-open-link">Ouvrir \u2197</a>
        </div>
        <iframe class="pdf-iframe" src="${recipe.pdf_url}" title="PDF recette"></iframe>
      </div>
      <span class="page-num-right">${currentIndex + 2}</span>`;
  }

  return `
    <div class="no-pdf-zone">
      <div>
        <span class="no-pdf-cat">${cat}</span>
        <div class="no-pdf-title">${recipe.title}</div>
        <div class="deco-line"></div>
        ${tagsHTML}
      </div>
      ${statsHTML}
      ${sourceHTML}
    </div>
    <span class="page-num-right">${currentIndex + 2}</span>`;
}

async function showPage(idx) {
  currentIndex = idx;
  const r = filteredRecipes[idx];
  if (!r) return;

  document.getElementById('pageLeft').innerHTML = `<div class="loading-state">\u2026</div>`;
  document.getElementById('pageRight').innerHTML = `<div class="loading-state"></div>`;

  const [lHTML] = await Promise.all([renderLeft(r)]);
  document.getElementById('pageLeft').innerHTML = lHTML;
  document.getElementById('pageRight').innerHTML = renderRight(r);
  updateControls();
}

async function changePage(dir) {
  if (isAnimating) return;
  const next = currentIndex + dir;
  if (next < 0 || next >= filteredRecipes.length) return;
  isAnimating = true;

  const animated = dir > 0 ? document.getElementById('pfcLeft') : document.getElementById('pfcRight');
  const cls = dir > 0 ? 'flipping-fwd' : 'flipping-back';
  animated.classList.add(cls);

  setTimeout(async () => {
    animated.classList.remove(cls);
    await showPage(next);
    isAnimating = false;
  }, 720);
}

function updateControls() {
  document.getElementById('prevBtn').disabled = currentIndex <= 0;
  document.getElementById('nextBtn').disabled = currentIndex >= filteredRecipes.length - 1;
  document.getElementById('pageCounter').textContent = `${currentIndex + 1}\u202f/\u202f${filteredRecipes.length}`;
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  filteredRecipes = allRecipes.filter(r => {
    const catOk = catFilter === 0 || r.category_id === catFilter;
    const qOk = !q || r.title.toLowerCase().includes(q) || (r.tags||[]).some(t => t.toLowerCase().includes(q));
    return catOk && qOk;
  });
  currentIndex = 0;
  showPage(0);
  buildTOC();
}

document.getElementById('search').addEventListener('input', applyFilter);
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    catFilter = parseInt(btn.dataset.cat);
    applyFilter();
  });
});

function buildTOC() {
  const body = document.getElementById('tocBody');
  const grouped = {};
  filteredRecipes.forEach((r, i) => {
    const cat = CATS[r.category_id] || 'Autre';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push({ r, i });
  });
  body.innerHTML = Object.entries(grouped).map(([cat, items]) => `
    <div class="toc-section-title">${cat}</div>
    <div class="toc-grid">
      ${items.map(({r, i}) => `
        <div class="toc-item" onclick="goToRecipe(${i})">
          <span class="toc-dot" style="background:${CAT_COLORS[r.category_id]||'#888'}"></span>
          ${r.title}
        </div>`).join('')}
    </div>`).join('');
}

function goToRecipe(i) { closeTOC(); showPage(i); }
function openTOC() { document.getElementById('tocOverlay').classList.add('open'); }
function closeTOC() { document.getElementById('tocOverlay').classList.remove('open'); }
function closeTOCOutside(e) { if (e.target === document.getElementById('tocOverlay')) closeTOC(); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') changePage(1);
  else if (e.key === 'ArrowLeft') changePage(-1);
  else if (e.key === 'Escape') closeTOC();
  else if (e.key === 't' || e.key === 'T') openTOC();
});

(async () => {
  allRecipes = await sb('recipes?select=*&order=title');
  filteredRecipes = [...allRecipes];
  buildTOC();
  await showPage(0);
})();
</script>
</body>
</html>
