<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Livre de Recettes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <div class="site-logo">Le Livre de Recettes</div>
  <div class="topbar-right">
    <input type="search" class="search-input" id="search" placeholder="Rechercher…">
    <div class="filters">
      <button class="cat-btn active" data-cat="0">Toutes</button>
      <button class="cat-btn" data-cat="1">Entrées</button>
      <button class="cat-btn" data-cat="2">Plats</button>
      <button class="cat-btn" data-cat="3">Poissons</button>
      <button class="cat-btn" data-cat="4">Desserts</button>
    </div>
    <div class="page-counter" id="pageCounter">— / —</div>
  </div>
</div>

<div class="stage">
  <div class="book-outer">
    <div class="book">
      <div class="spine"></div>
      <div class="book-pages">
        <div class="page-flip-container pfc-left" id="pfcLeft">
          <div class="page-left" id="pageLeft">
            <div class="loading-state">Chargement…</div>
          </div>
        </div>
        <div class="page-flip-container pfc-right" id="pfcRight">
          <div class="page-right" id="pageRight">
            <div class="loading-state"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<button class="nav-arrow nav-prev" id="prevBtn" onclick="changePage(-1)" disabled>‹</button>
<button class="nav-arrow nav-next" id="nextBtn" onclick="changePage(1)">›</button>
<button class="toc-btn" onclick="openTOC()">Table des matières</button>

<div class="toc-overlay" id="tocOverlay" onclick="closeTOCOutside(event)">
  <div class="toc-panel">
    <div class="toc-panel-header">
      <div class="toc-panel-title">Table des Matières</div>
      <button class="toc-close" onclick="closeTOC()">Fermer ✕</button>
    </div>
    <div class="toc-body" id="tocBody"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
