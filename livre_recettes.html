<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Livre de Recettes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar" role="banner">
  <div class="site-logo" aria-label="Le Livre de Recettes">Le Livre de Recettes</div>
  <div class="topbar-right">
    <label for="search" class="sr-only">Rechercher une recette</label>
    <input type="search" class="search-input" id="search" placeholder="Rechercher…" aria-label="Rechercher une recette">
    <nav class="filters" aria-label="Filtrer par catégorie">
      <button class="cat-btn active" data-cat="0" aria-pressed="true">Toutes</button>
      <button class="cat-btn" data-cat="1" aria-pressed="false">Entrées</button>
      <button class="cat-btn" data-cat="2" aria-pressed="false">Plats</button>
      <button class="cat-btn" data-cat="3" aria-pressed="false">Poissons</button>
      <button class="cat-btn" data-cat="4" aria-pressed="false">Desserts</button>
      <button class="cat-btn" data-cat="fav" aria-pressed="false">★ Favoris</button>
    </nav>
    <div class="page-counter" id="pageCounter" aria-live="polite" aria-label="Position dans le livre">— / —</div>
    <button class="submit-btn" onclick="openSubmit()" aria-haspopup="dialog" aria-label="Proposer une recette">+ Recette</button>
  </div>
</header>

<main class="stage" aria-label="Livre de recettes">
  <div class="book-outer">
    <div class="book" role="region" aria-label="Pages du livre">
      <div class="spine" aria-hidden="true"></div>
      <div class="book-pages">
        <div class="page-flip-container pfc-left" id="pfcLeft">
          <article class="page-left" id="pageLeft" aria-label="Recette">
            <div class="loading-state">Chargement…</div>
          </article>
        </div>
        <div class="page-flip-container pfc-right" id="pfcRight">
          <aside class="page-right" id="pageRight" aria-label="Détails et statistiques">
            <div class="loading-state"></div>
          </aside>
        </div>
      </div>
    </div>
  </div>
</main>

<button class="nav-arrow nav-prev" id="prevBtn" onclick="changePage(-1)" aria-label="Recette précédente" disabled>‹</button>
<button class="nav-arrow nav-next" id="nextBtn" onclick="changePage(1)" aria-label="Recette suivante">›</button>
<button class="toc-btn" onclick="openTOC()" aria-haspopup="dialog">Table des matières</button>

<div class="toc-overlay" id="tocOverlay" role="dialog" aria-modal="true" aria-label="Table des matières" onclick="closeTOCOutside(event)">
  <div class="toc-panel">
    <div class="toc-panel-header">
      <div class="toc-panel-title">Table des Matières</div>
      <button class="toc-close" onclick="closeTOC()" aria-label="Fermer la table des matières">Fermer ✕</button>
    </div>
    <div class="toc-body" id="tocBody"></div>
  </div>
</div>

<div class="submit-overlay" id="submitOverlay" role="dialog" aria-modal="true" aria-label="Proposer une recette" onclick="closeSubmitOutside(event)">
  <div class="submit-panel">
    <div class="submit-panel-header">
      <div>
        <div class="submit-panel-title">Proposer une recette</div>
        <div class="submit-panel-subtitle">Elle sera relue et ajoutée au livre par l'administrateur.</div>
      </div>
      <button class="submit-close" onclick="closeSubmit()" aria-label="Fermer">Fermer ✕</button>
    </div>
    <form class="submit-form" onsubmit="submitRecipe(event)">
      <div class="submit-field">
        <label class="submit-label" for="sf-title">Nom de la recette *</label>
        <input class="submit-input" id="sf-title" type="text" required placeholder="Ex : Tarte aux pommes de mamie">
      </div>
      <div class="submit-field">
        <label class="submit-label" for="sf-cat">Catégorie</label>
        <select class="submit-select" id="sf-cat">
          <option value="">— Choisir —</option>
          <option value="1">Entrée</option>
          <option value="2">Plat</option>
          <option value="3">Poisson</option>
          <option value="4">Dessert</option>
          <option value="5">Gibier</option>
          <option value="6">Accompagnement</option>
        </select>
      </div>
      <div class="submit-field">
        <label class="submit-label" for="sf-author">Ton prénom</label>
        <input class="submit-input" id="sf-author" type="text" placeholder="Ex : Tante Marie">
      </div>
      <div class="submit-field">
        <label class="submit-label" for="sf-ingredients">Ingrédients</label>
        <textarea class="submit-textarea" id="sf-ingredients" rows="4" placeholder="Un par ligne :&#10;200g beurre&#10;3 œufs&#10;…"></textarea>
      </div>
      <div class="submit-field">
        <label class="submit-label" for="sf-steps">Préparation</label>
        <textarea class="submit-textarea" id="sf-steps" rows="5" placeholder="Décris les étapes de la recette…"></textarea>
      </div>
      <div class="submit-field">
        <label class="submit-label" for="sf-notes">Notes (optionnel)</label>
        <textarea class="submit-textarea" id="sf-notes" rows="2" placeholder="Conseils, variantes, souvenirs…"></textarea>
      </div>
      <div id="submitFeedback" class="submit-feedback" aria-live="polite"></div>
      <button type="submit" class="submit-form-btn">Envoyer la recette</button>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
